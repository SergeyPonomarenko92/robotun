services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: robotun
      POSTGRES_PASSWORD: robotun_dev
      POSTGRES_DB: robotun
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robotun -d robotun"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: robotun
      MINIO_ROOT_PASSWORD: robotun_dev_minio
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  clamav:
    # Module 6 §SEC-007 — async AV scan of all uploaded media before
    # public availability. Daemon listens on 3310 (INSTREAM protocol).
    # First-boot signature DB download takes ~2-3 min; healthcheck waits.
    image: clamav/clamav:1.4
    ports:
      - "3310:3310"
    volumes:
      - clamavdb:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdb:
